  .bar-fill{height:100%;background:#C9A227;border-radius:99px;width:0%;transition:width .35s ease;}
  .count{font-size:13px;font-variant-numeric:tabular-nums;color:#DDE3D6;white-space:nowrap;}

  .filters{max-width:860px;margin:16px auto 0;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;}
  .chip{border:1.5px solid var(--line);background:var(--card);color:var(--slate);border-radius:99px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .chip:hover{border-color:var(--pine);color:var(--pine);}
  .chip.active{background:var(--pine);border-color:var(--pine);color:#fff;}
  .chip.urgent-chip.active{background:var(--signal);border-color:var(--signal);}

  main{max-width:860px;margin:0 auto;padding:8px 20px 40px;}
  section{margin-top:34px;}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:6px;}
  .sec-title{font-size:clamp(19px,3vw,24px);font-weight:600;}
  .sec-count{font-size:12px;color:var(--slate);font-variant-numeric:tabular-nums;white-space:nowrap;}
  .sec-note{font-size:13px;color:var(--slate);margin:6px 0 14px;}
  .urgent .sec-head{border-bottom-color:var(--signal);}
  .urgent .sec-title{color:var(--signal);}

  .group{margin-top:18px;}
  .group-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--saddle);font-weight:700;margin-bottom:8px;}

  .task{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;cursor:pointer;transition:border-color .15s, background .2s;}
  .task:hover{border-color:var(--pine);}
  .task.checked{background:#F2F1EB;border-color:var(--line);}
  .box{flex-shrink:0;width:22px;height:22px;border:2px solid var(--pine);border-radius:6px;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .task.checked .box{background:var(--pine);border-color:var(--pine);}
  .box svg{width:14px;height:14px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:opacity .15s;}
  .task.checked .box svg{opacity:1;}
  .task-body{flex:1;min-width:0;}
  .task-title{font-weight:700;font-size:15px;line-height:1.35;}
  .task.checked .task-title{color:var(--done);text-decoration:line-through;text-decoration-thickness:1.5px;}
  .task-desc{font-size:13px;color:var(--slate);margin-top:3px;line-height:1.45;}
  .task.checked .task-desc{color:#B4B9AC;}
  .tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:99px;margin-top:6px;margin-right:5px;}
  .tag.urgent{background:#F6E3DE;color:var(--signal);}
  .tag.agent{background:#E5EBE2;color:var(--pine);}
  .tag.co{background:#F0E8DE;color:var(--saddle);}

  .empty{color:var(--slate);font-size:14px;padding:24px 0;text-align:center;}
  footer{max-width:860px;margin:40px auto 0;padding:0 20px;font-size:12px;color:var(--slate);text-align:center;}
  @media(max-width:520px){.task{padding:11px 12px;} .filters{gap:6px;} .chip{padding:6px 11px;font-size:12px;}}

    const secEl = document.createElement("section");
    if(sec.cls) secEl.className = sec.cls;
    let secTotal=0, secDone=0, groupsHtml="";
    sec.groups.forEach((grp,gi)=>{
      let itemsHtml="";
      grp.items.forEach((it,ti)=>{
        const id = taskId(si,gi,ti);
        const isC = !!checked[id];
        secTotal++; if(isC) secDone++;
        const tags = (it.tags||[]).map(tg=>{
          if(tg==="urgent") return '<span class="tag urgent">Urgent</span>';
          if(tg==="agent") return '<span class="tag agent">Agent-ready</span>';
          return '<span class="tag co">'+tg+'</span>';
        }).join("");
        itemsHtml += '<div class="task'+(isC?" checked":"")+'" data-id="'+id+'">'
          +'<div class="box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'
          +'<div class="task-body"><div class="task-title">'+it.t+'</div>'
          +(it.d?'<div class="task-desc">'+it.d+'</div>':'')
          +(tags?'<div>'+tags+'</div>':'')
          +'</div></div>';
      });
      groupsHtml += '<div class="group"><div class="group-label">'+grp.g+'</div>'+itemsHtml+'</div>';
    });
    total+=secTotal; done+=secDone;
    secEl.innerHTML = '<div class="sec-head"><div class="sec-title display">'+sec.sec+'</div>'
      +'<div class="sec-count">'+secDone+' / '+secTotal+'</div></div>'
      +(sec.note?'<div class="sec-note">'+sec.note+'</div>':'')
      +groupsHtml;
    main.appendChild(secEl);
  });
  if(activeFilter==="all"){
    total=0;done=0;
    DATA.forEach((sec,si)=>sec.groups.forEach((grp,gi)=>grp.items.forEach((it,ti)=>{total++;if(checked[taskId(si,gi,ti)])done++;})));
  } else {
    total=0;done=0;
    DATA.forEach((sec,si)=>sec.groups.forEach((grp,gi)=>grp.items.forEach((it,ti)=>{total++;if(checked[taskId(si,gi,ti)])done++;})));
  }
  document.getElementById("totalCount").textContent = done+" of "+total+" knocked out";
  document.getElementById("barFill").style.width = (total? (done/total*100):0)+"%";
}

function renderFilters(){
  const wrap = document.getElementById("filters");
  const defs = [["all","Everything"],["urgent","Urgent"],["personal","Personal"],["hp","HP Companies"],["restore","Restore"],["agents","Agentic Builds"],["content","Content"]];
  wrap.innerHTML = defs.map(([id,label])=>'<button class="chip'+(id==="urgent"?" urgent-chip":"")+(activeFilter===id?" active":"")+'" data-f="'+id+'">'+label+'</button>').join("");
  wrap.querySelectorAll(".chip").forEach(b=>b.addEventListener("click",()=>{activeFilter=b.dataset.f;renderFilters();render();window.scrollTo({top:0,behavior:"smooth"});}));
}

function save(){
  try{ localStorage.setItem("master-checklist-v1", JSON.stringify(checked)); }catch(e){}
}
function load(){
  try{
    const r = localStorage.getItem("master-checklist-v1");
    if(r) checked = JSON.parse(r);
  }catch(e){ checked = {}; }
}

document.getElementById("main").addEventListener("click",(e)=>{
  const t = e.target.closest(".task");
  if(!t) return;
  const id = t.dataset.id;
  checked[id] = !checked[id];
  if(!checked[id]) delete checked[id];
  render();
  save();
});

load(); renderFilters(); render();
</script>
</body>
</html>
