name = "social-ai-responder"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# KV: dedup of incoming events + escalation queue.
# Create with `npm run kv:create`, then paste the returned id below.
[[kv_namespaces]]
binding = "STATE"
id = "94b8fca6b2f04f20a7743a5bc469232a"

# Free AI brain: Cloudflare Workers AI (no extra account, free daily allowance).
[ai]
binding = "AI"

[vars]
# Non-secret config. Secrets (tokens/keys) go via `wrangler secret put` — see README.
# "workers-ai" = free (Llama on Cloudflare). Switch to "claude" + set ANTHROPIC_API_KEY
# for the sharper paid brain — no code changes needed.
AI_PROVIDER = "workers-ai"
WORKERS_AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
CLAUDE_MODEL = "claude-opus-4-8"
# Effort for the per-message classify+draft call. low = fast/cheap (good for short
# social replies); raise to "medium" if escalation judgment needs to be sharper.
CLAUDE_EFFORT = "low"
# Hard floor on confidence (0-1) for an auto-reply. Below this we escalate even if
# the model chose auto_reply. Belt-and-suspenders on top of the model's own decision.
MIN_AUTOREPLY_CONFIDENCE = "0.72"
