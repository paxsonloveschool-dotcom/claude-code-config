# Social Suite local stack.
# orchestrator (FastAPI API) + worker (queue consumer) + redis (queue).
# whisper / ffmpeg services are commented placeholders — uncomment and supply
# images once the transcribe/burn stages are implemented.

services:
  orchestrator:
    build: .
    command: uvicorn services.orchestrator.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./media:/app/media

  worker:
    build: .
    # Placeholder command: a real worker pulls jobs off the Redis queue and runs
    # services.orchestrator.pipeline.run_pipeline(). Swap for `rq worker` etc.
    command: python -m services.orchestrator.pipeline
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./media:/app/media

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

