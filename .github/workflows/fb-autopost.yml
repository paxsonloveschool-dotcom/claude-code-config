name: Facebook auto-post (HP videos -> FB Page)

# DISABLED cron: Facebook is now posted from the Mac by automation/post_all.py
# (the unified same-clip rotation shared with Instagram). The cloud cron is off
# so Facebook never double-posts. Left as workflow_dispatch for manual/backup use.
on:
  # schedule:
  #   - cron: "0 12 * * *"   # (disabled — Mac's post_all.py posts Facebook now)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set 'true' to print the plan and post nothing"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  fb-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install social-suite + Dropbox
        run: pip install -e social-suite dropbox

      - name: Schedule HP videos onto Facebook
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          BRAND_HP_FB_PAGE_ID: ${{ secrets.BRAND_HP_FB_PAGE_ID }}
          BRAND_HP_META_ACCESS_TOKEN: ${{ secrets.BRAND_HP_META_ACCESS_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        working-directory: social-suite
        run: python automation/fb_autopost.py

      - name: Commit posted state (if changed)
        run: |
          git add social-suite/content/fb_posted.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(fb): update Facebook posted state [skip ci]"
          git push
