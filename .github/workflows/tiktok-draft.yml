name: TikTok draft push (send a video to TikTok drafts)

# Sends a video into a brand's TikTok app as a DRAFT (the "Upload to TikTok"
# flow). The owner opens TikTok, adds a trending sound + caption, and Posts by
# hand — so this needs NO audit and never makes anything public on its own.
#
# Uses the brand's stored refresh token to mint a fresh ~24h access token, so it
# runs unattended. The refresh token MUST carry the `video.upload` scope (re-link
# once via the "TikTok authorize URL" -> "TikTok link" workflows) and must be
# stored as BRAND_<brand>_TIKTOK_REFRESH_TOKEN.
#
# Requires repo secrets:
#   BRAND_HP_TIKTOK_REFRESH_TOKEN / _CLIENT_KEY / _CLIENT_SECRET   (or RESTORE_*)

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand (matches BRAND_<brand>_TIKTOK_* secrets)"
        type: choice
        default: HP
        options: [HP, RESTORE]
      media_url:
        description: "Video URL to send to TikTok drafts"
        required: true
        type: string
        default: "https://www.dropbox.com/scl/fi/y9jurmgh7echtmzk9vz4d/video-apr-21-2025-9-38-20-am-barry-04-full.mp4?rlkey=obapz90xseapth8cv4e6a01eh&raw=1"

permissions:
  contents: read

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install social-suite (core)
        run: pip install -e social-suite

      - name: Refresh token + push the video to TikTok drafts
        env:
          BRAND: ${{ inputs.brand }}
          MEDIA_URL: ${{ inputs.media_url }}
          TIKTOK_CLIENT_KEY: ${{ inputs.brand == 'HP' && secrets.BRAND_HP_TIKTOK_CLIENT_KEY || secrets.BRAND_RESTORE_TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ inputs.brand == 'HP' && secrets.BRAND_HP_TIKTOK_CLIENT_SECRET || secrets.BRAND_RESTORE_TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ inputs.brand == 'HP' && secrets.BRAND_HP_TIKTOK_REFRESH_TOKEN || secrets.BRAND_RESTORE_TIKTOK_REFRESH_TOKEN }}
        run: |
          cd social-suite
          python - <<'PY'
          import os, json, time, sys
          sys.path.insert(0, "services")
          from services.publish.direct import tiktok_oauth, tiktok

          ck = os.environ.get("TIKTOK_CLIENT_KEY", "").strip()
          cs = os.environ.get("TIKTOK_CLIENT_SECRET", "").strip()
          rt = os.environ.get("TIKTOK_REFRESH_TOKEN", "").strip()
          url = os.environ.get("MEDIA_URL", "").strip()
          brand = os.environ.get("BRAND", "HP").strip().upper()
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          def summary(md):
              with open(summary_path, "a") as f:
                  f.write(md + "\n")

          if not (ck and cs and rt):
              summary(f"## ❌ Missing TikTok secrets for {brand}\n"
                      f"Need `BRAND_{brand}_TIKTOK_REFRESH_TOKEN`, `_CLIENT_KEY`, "
                      f"`_CLIENT_SECRET`. Re-link the account first.")
              raise SystemExit("Missing TikTok secrets.")

          tok = tiktok_oauth.refresh_access_token(ck, cs, rt)
          access = tok.get("access_token", "")
          new_rt = tok.get("refresh_token", "")
          print(f"::add-mask::{access}")
          print(f"::add-mask::{new_rt}")
          scope = tok.get("scope", "")
          if "video.upload" not in scope:
              summary("## ❌ This link lacks the `video.upload` scope\n"
                      f"scope: `{scope}`\nRe-link via **TikTok authorize URL** -> "
                      "**TikTok link** to grant drafts access, then re-run.")
              raise SystemExit("Missing video.upload scope.")

          pub_id = tiktok.upload_to_inbox(access, url)
          print("INBOX_PUBLISH_ID:", pub_id)
          summary(f"## 📲 Sent to {brand} TikTok drafts\n- publish_id: `{pub_id}`")
          last = None
          for _ in range(20):
              resp = tiktok.fetch_status(access, pub_id)
              st = (resp.get("data") or {}).get("status")
              print("INBOX_STATUS:", st, "| raw:", json.dumps(resp)[:400])
              last = st
              if st in ("SEND_TO_USER_INBOX", "PUBLISH_COMPLETE", "FAILED", None):
                  break
              time.sleep(3)
          summary(f"- status: `{last}`")
          summary("\nOpen the **TikTok app** -> the draft is waiting. Add your sound + "
                  "caption, then Post. ✅\n\n"
                  "_Note: TikTok rotated the refresh token. If unattended pushes "
                  "start failing, re-link to refresh the stored token._")
          PY
