name: Video pipeline (Dropbox -> review)

# Pulls new videos from each brand's Dropbox folder, captions them, uploads the
# finished clip to <Brand>/processed/ for the owner to watch, and appends a
# REVIEW entry to the queue. It NEVER posts — review items sit until approved.
# Manual-only for now (run it on demand).
on:
  workflow_dispatch:
    inputs:
      recut_specs:
        description: "Optional JSON list of precise recuts (else normal chunking)"
        required: false
        default: ""
      dump_transcript:
        description: "Set true to just print/commit a timestamped transcript"
        required: false
        default: ""
      dump_thumbs:
        description: "Set true to commit a contact-sheet image per video (to 'see' it)"
        required: false
        default: ""
      auto_highlights:
        description: "Number of clips to auto-pick from a narrated video (e.g. 4)"
        required: false
        default: ""
      keep_ids:
        description: "Comma-separated clip ids to KEEP; all others are deleted"
        required: false
        default: ""
      fetch_previews:
        description: "'all' or comma ids: pull finished clips into content/preview/"
        required: false
        default: ""
      ig_reference:
        description: "Brand key to pull posted IG style from (e.g. hp or hp:30)"
        required: false
        default: ""
      ingest_clip:
        description: "Save a ready-made clip: 'name:relpath' (uploads + review entry)"
        required: false
        default: ""
      montage_spec:
        description: "JSON: layout-shifting hype montage (3-up/2-up/single segments)"
        required: false
        default: ""
      detect_shots:
        description: "Scene-split brand videos -> content/shots/*.json. '1'/'true'=all, 'force'=redo, or a filename substring"
        required: false
        default: ""
      video:
        description: "Filename substring to target one specific video (for cuts)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install social-suite + transcription
        run: |
          pip install -e social-suite
          pip install faster-whisper

      - name: Process Dropbox videos into the review queue (NO posting)
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          # Read-only: used by ig_reference to study a brand's posted house style.
          BRAND_HP_META_ACCESS_TOKEN: ${{ secrets.BRAND_HP_META_ACCESS_TOKEN }}
          BRAND_HP_IG_USER_ID: ${{ secrets.BRAND_HP_IG_USER_ID }}
          BRAND_HP_FB_PAGE_ID: ${{ secrets.BRAND_HP_FB_PAGE_ID }}
          BRAND_RESTORE_META_ACCESS_TOKEN: ${{ secrets.BRAND_RESTORE_META_ACCESS_TOKEN }}
          BRAND_RESTORE_IG_USER_ID: ${{ secrets.BRAND_RESTORE_IG_USER_ID }}
          BRAND_RESTORE_FB_PAGE_ID: ${{ secrets.BRAND_RESTORE_FB_PAGE_ID }}
          INGEST_DOWNLOAD_DIR: ./_ingest
          # Small/fast Whisper model + CPU (no GPU on the runner).
          WHISPER_MODEL: base
          WHISPER_DEVICE: cpu
          # A font that exists on the runner (libass/fontconfig name).
          CAPTION_FONT: DejaVu Sans
          # When set, do precise manual recuts instead of normal chunking.
          RECUT_SPECS: ${{ inputs.recut_specs }}
          DUMP_TRANSCRIPT: ${{ inputs.dump_transcript }}
          DUMP_THUMBS: ${{ inputs.dump_thumbs }}
          AUTO_HIGHLIGHTS: ${{ inputs.auto_highlights }}
          KEEP_IDS: ${{ inputs.keep_ids }}
          FETCH_PREVIEWS: ${{ inputs.fetch_previews }}
          IG_REFERENCE: ${{ inputs.ig_reference }}
          INGEST_CLIP: ${{ inputs.ingest_clip }}
          MONTAGE_SPEC: ${{ inputs.montage_spec }}
          DETECT_SHOTS: ${{ inputs.detect_shots }}
          PIPELINE_VIDEO: ${{ inputs.video }}
        working-directory: social-suite
        run: python automation/video_pipeline.py

      - name: Commit review results (queue + processed set)
        run: |
          git add social-suite/content/queue.json social-suite/content/processed.json social-suite/content/transcripts social-suite/content/thumbs social-suite/content/reference social-suite/content/shots 2>/dev/null || true
          # Previews are *.mp4 (gitignored) — force-add so they can be viewed/sent.
          git add -f social-suite/content/preview 2>/dev/null || true
          if git diff --cached --quiet && git diff --quiet -- social-suite/content; then
            echo "No new review items."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social-suite/content/queue.json social-suite/content/processed.json social-suite/content/transcripts social-suite/content/thumbs social-suite/content/reference social-suite/content/shots 2>/dev/null || true
          git add -f social-suite/content/preview 2>/dev/null || true
          git commit -m "chore(pipeline): add review item(s) from Dropbox videos [skip ci]"
          git push
