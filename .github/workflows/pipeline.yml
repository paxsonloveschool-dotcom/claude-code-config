name: Video pipeline (Dropbox -> review)

# Pulls new videos from each brand's Dropbox folder, captions them, uploads the
# finished clip to <Brand>/processed/ for the owner to watch, and appends a
# REVIEW entry to the queue. It NEVER posts — review items sit until approved.
# Manual-only for now (run it on demand).
on:
  workflow_dispatch:
    inputs:
      recut_specs:
        description: "Optional JSON list of precise recuts (else normal chunking)"
        required: false
        default: ""
      dump_transcript:
        description: "Set true to just print/commit a timestamped transcript"
        required: false
        default: ""
      dump_thumbs:
        description: "Set true to commit a contact-sheet image per video (to 'see' it)"
        required: false
        default: ""
      thumb_frames:
        description: "Frames per contact sheet (default 6; use 30+ for a dense scan)"
        required: false
        default: ""
      auto_highlights:
        description: "Number of clips to auto-pick from a narrated video (e.g. 4)"
        required: false
        default: ""
      keep_ids:
        description: "Comma-separated clip ids to KEEP; all others are deleted"
        required: false
        default: ""
      fetch_previews:
        description: "'all' or comma ids: pull finished clips into content/preview/"
        required: false
        default: ""
      ingest_clip:
        description: "Save a ready-made clip: 'name:relpath' (uploads + review entry)"
        required: false
        default: ""
      montage_spec_file:
        description: "Repo path to a committed montage spec JSON (avoids transcription errors)"
        required: false
        default: ""
      video:
        description: "Filename substring to target one specific video (for cuts)"
        required: false
        default: ""
      content_folder:
        description: "Source folder under each brand to pull from. Work=HP Content, talking=HP Talking Content"
        required: false
        default: "HP Content"
      posts_folder:
        description: "Destination folder for SAVED clips (promote/demote/clean)."
        required: false
        default: "HP Posts"
      dropbox_ls:
        description: "Set true to print the Dropbox folder tree and exit"
        required: false
        default: ""
      dropbox_whoami:
        description: "Set true to report which Dropbox account is connected (email/name)"
        required: false
        default: ""
      dropbox_usage:
        description: "Set true to report storage used + per-folder size breakdown"
        required: false
        default: ""
      dropbox_inventory:
        description: "Set true to dump a full file manifest (path/size) to a committed CSV"
        required: false
        default: ""
      purge_edited:
        description: "'list' to dry-run, 'go' to DELETE all edited clips in processed-type folders (keeps originals + HP Posts)"
        required: false
        default: ""
      dropbox_organize:
        description: "'go' to create Ready-To-Post + Drop-Content folders and move keepers"
        required: false
        default: ""
      promote_ids:
        description: "Comma ids to MOVE into Ready To Post (approved keepers; no posting)"
        required: false
        default: ""
      delete_ids:
        description: "Comma ids to DELETE (Dropbox file + queue entry); runs before montage"
        required: false
        default: ""
      demote_ids:
        description: "'all' or comma ids to UN-SAVE (move out of Ready To Post back to processed)"
        required: false
        default: ""
      clean_ready:
        description: "'go' to delete stale/old files left in Ready To Post (keep only current set)"
        required: false
        default: ""
      save_styled:
        description: "Repo dir of locally-finished clips (logo+outro) to upload into HP Posts + repoint queue"
        required: false
        default: ""
      copy_styled:
        description: "'dir:Folder' — copy committed finished clips to a second Dropbox folder (e.g. HP Tiktok)"
        required: false
        default: ""
      swap_outro:
        description: "Comma queue ids — replace the old 3s brand outro tail with the current brand outro"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install social-suite + transcription
        run: |
          pip install -e social-suite
          pip install faster-whisper

      - name: Process Dropbox videos into the review queue (NO posting)
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          # Read-only: used by ig_reference to study a brand's posted house style.
          BRAND_HP_META_ACCESS_TOKEN: ${{ secrets.BRAND_HP_META_ACCESS_TOKEN }}
          BRAND_HP_IG_USER_ID: ${{ secrets.BRAND_HP_IG_USER_ID }}
          BRAND_HP_FB_PAGE_ID: ${{ secrets.BRAND_HP_FB_PAGE_ID }}
          BRAND_RESTORE_META_ACCESS_TOKEN: ${{ secrets.BRAND_RESTORE_META_ACCESS_TOKEN }}
          BRAND_RESTORE_IG_USER_ID: ${{ secrets.BRAND_RESTORE_IG_USER_ID }}
          BRAND_RESTORE_FB_PAGE_ID: ${{ secrets.BRAND_RESTORE_FB_PAGE_ID }}
          INGEST_DOWNLOAD_DIR: ./_ingest
          # Small/fast Whisper model + CPU (no GPU on the runner).
          WHISPER_MODEL: base
          WHISPER_DEVICE: cpu
          # A font that exists on the runner (libass/fontconfig name).
          CAPTION_FONT: DejaVu Sans
          # When set, do precise manual recuts instead of normal chunking.
          RECUT_SPECS: ${{ inputs.recut_specs }}
          DUMP_TRANSCRIPT: ${{ inputs.dump_transcript }}
          DUMP_THUMBS: ${{ inputs.dump_thumbs }}
          THUMB_FRAMES: ${{ inputs.thumb_frames }}
          AUTO_HIGHLIGHTS: ${{ inputs.auto_highlights }}
          KEEP_IDS: ${{ inputs.keep_ids }}
          FETCH_PREVIEWS: ${{ inputs.fetch_previews }}
          INGEST_CLIP: ${{ inputs.ingest_clip }}
          MONTAGE_SPEC_FILE: ${{ inputs.montage_spec_file }}
          PIPELINE_VIDEO: ${{ inputs.video }}
          CONTENT_FOLDER: ${{ inputs.content_folder }}
          POSTS_FOLDER: ${{ inputs.posts_folder }}
          DROPBOX_LS: ${{ inputs.dropbox_ls }}
          DROPBOX_WHOAMI: ${{ inputs.dropbox_whoami }}
          DROPBOX_USAGE: ${{ inputs.dropbox_usage }}
          DROPBOX_INVENTORY: ${{ inputs.dropbox_inventory }}
          PURGE_EDITED: ${{ inputs.purge_edited }}
          DROPBOX_ORGANIZE: ${{ inputs.dropbox_organize }}
          PROMOTE_IDS: ${{ inputs.promote_ids }}
          DELETE_IDS: ${{ inputs.delete_ids }}
          DEMOTE_IDS: ${{ inputs.demote_ids }}
          CLEAN_READY: ${{ inputs.clean_ready }}
          SAVE_STYLED: ${{ inputs.save_styled }}
          COPY_STYLED: ${{ inputs.copy_styled }}
          SWAP_OUTRO: ${{ inputs.swap_outro }}
          # Render montages at fast 1080x1920 (speed over 4K) — quick to render/fetch/finish.
          MONTAGE_HD: "1"
        working-directory: social-suite
        run: python automation/video_pipeline.py

      - name: Commit review results (queue + processed set)
        run: |
          git add social-suite/content/queue.json social-suite/content/processed.json social-suite/content/transcripts social-suite/content/thumbs social-suite/content/reference 2>/dev/null || true
          # Previews are *.mp4 (gitignored) — force-add so they can be viewed/sent.
          git add -f social-suite/content/preview 2>/dev/null || true
          if git diff --cached --quiet && git diff --quiet -- social-suite/content; then
            echo "No new review items."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social-suite/content/queue.json social-suite/content/processed.json social-suite/content/transcripts social-suite/content/thumbs social-suite/content/reference 2>/dev/null || true
          git add -f social-suite/content/preview 2>/dev/null || true
          git commit -m "chore(pipeline): add review item(s) from Dropbox videos [skip ci]"
          # Rebase-and-retry so concurrent runs don't clobber each other's pushes.
          branch=claude/happy-faraday-poh621
          for i in 1 2 3 4 5 6; do
            if git push origin "HEAD:$branch"; then echo "pushed"; break; fi
            echo "push rejected (attempt $i) — rebasing on origin/$branch"
            git pull --rebase --autostash origin "$branch" || true
            sleep $(( (RANDOM % 4) + i ))
          done
