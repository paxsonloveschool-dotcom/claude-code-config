name: TikTok link (one-time)

# One-time helper to LINK a brand's TikTok account, run from GitHub's servers
# (which can reach TikTok's API, unlike the dev sandbox). You paste the fresh
# authorize `code`; this job:
#   1. exchanges it for tokens (access + the long-lived ~365d refresh token),
#   2. optionally posts ONE private (SELF_ONLY) test video to confirm posting,
#   3. if a GH_PAT secret with "Secrets: write" exists, stores the refresh token
#      straight into BRAND_<brand>_TIKTOK_REFRESH_TOKEN — the token is masked and
#      NEVER printed (this repo is public, so logs must never contain a token).
#
# Requires repo secrets (Settings → Secrets and variables → Actions):
#   BRAND_HP_TIKTOK_CLIENT_KEY, BRAND_HP_TIKTOK_CLIENT_SECRET   (or RESTORE_*)
#   GH_PAT  (optional) — a fine-grained PAT with Secrets:write, to auto-store the
#           refresh token. Without it, the link + test still run; production
#           persistence is handled separately.
#
# The authorize `code` expires within minutes — run this RIGHT AFTER clicking
# Allow on the authorize link.

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand to link (matches BRAND_<brand>_TIKTOK_* secrets)"
        type: choice
        default: HP
        options: [HP, RESTORE]
      code:
        description: "Paste the FULL callback URL from the address bar (or just the code= value)"
        required: true
        type: string
      redirect_uri:
        description: "Redirect URI — must match the app EXACTLY"
        required: true
        default: "https://hplandscapingllc.com/tiktok/callback"
        type: string
      inbox_media_url:
        description: "Video URL to push into TikTok DRAFTS (you add the sound + post). Blank = skip."
        required: false
        type: string
        default: "https://www.dropbox.com/scl/fi/y9jurmgh7echtmzk9vz4d/video-apr-21-2025-9-38-20-am-barry-04-full.mp4?rlkey=obapz90xseapth8cv4e6a01eh&raw=1"
      do_test_post:
        description: "Also post one private SELF_ONLY test video?"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install social-suite (core)
        run: pip install -e social-suite

      - name: Install ffmpeg (for the test clip)
        if: ${{ inputs.do_test_post }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Make a tiny private test clip (3s)
        if: ${{ inputs.do_test_post }}
        continue-on-error: true  # a clip hiccup must never waste the one-time code
        run: |
          ffmpeg -y -f lavfi -i color=c=0x1B5E20:s=720x1280:d=3 \
            -t 3 -r 30 -pix_fmt yuv420p -movflags +faststart /tmp/tiktok_test.mp4
          ls -la /tmp/tiktok_test.mp4

      - name: Exchange code (+ optional private test post + safe secret store)
        env:
          BRAND: ${{ inputs.brand }}
          TIKTOK_CLIENT_KEY: ${{ inputs.brand == 'HP' && secrets.BRAND_HP_TIKTOK_CLIENT_KEY || secrets.BRAND_RESTORE_TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ inputs.brand == 'HP' && secrets.BRAND_HP_TIKTOK_CLIENT_SECRET || secrets.BRAND_RESTORE_TIKTOK_CLIENT_SECRET }}
          TIKTOK_CODE: ${{ inputs.code }}
          TIKTOK_REDIRECT_URI: ${{ inputs.redirect_uri }}
          DO_TEST_POST: ${{ inputs.do_test_post }}
          INBOX_MEDIA_URL: ${{ inputs.inbox_media_url }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd social-suite
          python - <<'PY'
          import os, json, time, sys, subprocess, urllib.parse
          sys.path.insert(0, "services")
          from services.publish.direct import tiktok_oauth, tiktok

          ck = os.environ["TIKTOK_CLIENT_KEY"].strip()
          cs = os.environ["TIKTOK_CLIENT_SECRET"].strip()
          raw = os.environ["TIKTOK_CODE"].strip()
          if "code=" in raw:  # accept full callback URL or bare code; URL-decode either
              code = urllib.parse.parse_qs(urllib.parse.urlparse(raw).query).get("code", [""])[0]
          else:
              code = urllib.parse.unquote(raw)
          redirect = os.environ["TIKTOK_REDIRECT_URI"].strip()
          brand = os.environ.get("BRAND", "HP").strip().upper()
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          def summary(md):
              with open(summary_path, "a") as f:
                  f.write(md + "\n")

          def mask(v):  # tell the runner to redact this value everywhere in logs
              if v:
                  print(f"::add-mask::{v}")

          if not ck or not cs:
              summary("## ❌ Missing CLIENT_KEY/SECRET secret\n"
                      f"Add `BRAND_{brand}_TIKTOK_CLIENT_KEY` and "
                      f"`BRAND_{brand}_TIKTOK_CLIENT_SECRET` repo secrets, then re-run.")
              raise SystemExit("Missing client key/secret secret.")

          try:
              payload = tiktok_oauth.exchange_code(ck, cs, code, redirect)
          except Exception as e:
              summary(f"## ❌ Code exchange failed\n```\n{e}\n```\n"
                      "The code likely expired (they last only minutes) or the "
                      "redirect URI doesn't match. Click the authorize link again "
                      "for a FRESH code and re-run immediately.")
              raise

          refresh = payload.get("refresh_token", "")
          access = payload.get("access_token", "")
          mask(refresh); mask(access)  # never let a token appear in public logs
          summary("## ✅ TikTok linked")
          summary(f"- scope: `{payload.get('scope','')}`")
          summary(f"- refresh token lifetime: ~{payload.get('refresh_expires_in', 0)//86400} days")

          # Store the refresh token straight into a secret (masked, never printed).
          pat = os.environ.get("GH_PAT", "").strip()
          repo = os.environ.get("GH_REPO", "")
          if pat and refresh:
              env = dict(os.environ, GH_TOKEN=pat)
              r = subprocess.run(
                  ["gh", "secret", "set", f"BRAND_{brand}_TIKTOK_REFRESH_TOKEN",
                   "--repo", repo, "--body", refresh],
                  env=env, capture_output=True, text=True,
              )
              if r.returncode == 0:
                  summary(f"- 🔐 Stored `BRAND_{brand}_TIKTOK_REFRESH_TOKEN` secret automatically.")
              else:
                  summary("- ⚠️ Could not auto-store the refresh token "
                          f"(`{r.stderr.strip()[:120]}`). It is NOT printed for safety; "
                          "re-run with a valid GH_PAT (Secrets:write) to persist it.")
          else:
              summary("- ℹ️ Refresh token NOT stored (no `GH_PAT` secret). The test "
                      "below still proves posting works; add a GH_PAT and re-run to "
                      "persist the token for the unattended cron. (Token never printed.)")

          # Push the real video straight into the creator's TikTok DRAFTS using
          # the fresh access token we just got (so this works even without a
          # persisted refresh token). The owner finishes it in-app: add the
          # trending sound + caption, then Post. Needs the video.upload scope,
          # which the new authorize link grants.
          inbox_url = os.environ.get("INBOX_MEDIA_URL", "").strip()
          scope = payload.get("scope", "")
          if inbox_url:
              if "video.upload" not in scope:
                  summary("### ⚠️ Can't send to TikTok drafts — the link is missing "
                          "the `video.upload` scope.\nRe-run the **TikTok authorize "
                          "URL** workflow, tap Allow on that link, then paste the new "
                          "code here. (You likely used the old authorize link.)")
              else:
                  try:
                      pub_id = tiktok.upload_to_inbox(access, inbox_url)
                      print("INBOX_PUBLISH_ID:", pub_id)
                      summary("### 📲 Sent to your TikTok drafts\n"
                              f"- publish_id: `{pub_id}`")
                      last = None
                      for _ in range(20):
                          resp = tiktok.fetch_status(access, pub_id)
                          st = (resp.get("data") or {}).get("status")
                          print("INBOX_STATUS:", st, "| raw:", json.dumps(resp)[:400])
                          last = st
                          if st in ("SEND_TO_USER_INBOX", "PUBLISH_COMPLETE", "FAILED", None):
                              break
                          time.sleep(3)
                      summary(f"  - status: `{last}`")
                      summary("\n**On your phone:** open the **TikTok app** — there's a "
                              "notification/draft waiting. Tap it → **add your sound** → "
                              "paste the caption → **Post**. ✅")
                  except Exception as e:
                      print("INBOX_ERROR:", repr(e))
                      summary(f"### ⚠️ Link worked, but the draft push failed\n```\n{e}\n```")

          want_post = os.environ.get("DO_TEST_POST", "false").lower() == "true"
          if want_post and not os.path.exists("/tmp/tiktok_test.mp4"):
              summary("### ⚠️ Link OK, but the test clip wasn't created — skipping the "
                      "test post. (The token swap above still succeeded.)")
              want_post = False
          if want_post:
              try:
                  # creator_info first, surfaced to logs — its data explains most
                  # SELF_ONLY / sandbox rejections (privacy options, limits, etc.).
                  ci = tiktok.query_creator_info(access)
                  print("CREATOR_INFO:", json.dumps(ci)[:800])
                  pub_id = tiktok.post_tiktok(
                      access_token=access,
                      caption=f"{brand} suite test — private (SELF_ONLY)",
                      video="/tmp/tiktok_test.mp4",
                      privacy_level="SELF_ONLY",
                  )
                  print("PUBLISH_ID:", pub_id)
                  summary(f"### 🎬 Private test post sent\n- publish_id: `{pub_id}`")
                  last = None
                  for _ in range(20):
                      resp = tiktok.fetch_status(access, pub_id)
                      st = (resp.get("data") or {}).get("status")
                      print("STATUS:", st, "| raw:", json.dumps(resp)[:400])
                      summary(f"  - status: `{st}`")
                      last = st
                      if st in ("PUBLISH_COMPLETE", "FAILED", None):
                          break
                      time.sleep(3)
                  print("FINAL_STATUS:", last)
                  summary("\nOpen the **TikTok app → profile** to see the private video, "
                          "then delete it. Nobody else can see a SELF_ONLY post.")
              except Exception as e:
                  print("POST_ERROR:", repr(e))
                  summary(f"### ⚠️ Link worked, but the test post failed\n```\n{e}\n```")
          print("Done. See the run Summary.")
          PY
