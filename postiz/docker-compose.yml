services:
  # Reverse proxy — terminates HTTPS and auto-provisions a Let's Encrypt
  # certificate for ${DOMAIN}. This is what gives you the public https://
  # URL that Meta/X/etc. require for connecting accounts via OAuth.
  caddy:
    image: caddy:2-alpine
    container_name: postiz-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - postiz-network
    depends_on:
      - postiz

  postiz:
    # amd64 servers: leave default. ARM servers (e.g. Oracle A1): set
    # POSTIZ_IMAGE to a published -arm64 tag in your .env (see .env.example).
    image: ${POSTIZ_IMAGE:-ghcr.io/gitroomhq/postiz-app:latest}
    container_name: postiz
    restart: always
    environment:
      # --- Public URLs (must match your real domain) ---
      MAIN_URL: "https://${DOMAIN}"
      FRONTEND_URL: "https://${DOMAIN}"
      NEXT_PUBLIC_BACKEND_URL: "https://${DOMAIN}/api"
      # --- Internal wiring (leave as-is) ---
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      DATABASE_URL: "postgresql://postiz-user:${POSTGRES_PASSWORD}@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://postiz-redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      IS_GENERAL: "true"
      # Set to "true" AFTER you create your own account, to lock signups.
      DISABLE_REGISTRATION: "${DISABLE_REGISTRATION:-false}"
      # --- Local file storage for uploaded media ---
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    networks:
      - postiz-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: always
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  caddy-data:
  caddy-config:

networks:
  postiz-network:
