# Local-only Postiz — run it on your own machine (Mac/Windows/Linux).
# Opens at http://localhost:5000. No domain, no cloud, no card, no HTTPS.
# NOT for production: the secrets below are fixed local-dev values.
#
#   Start:  docker compose -f docker-compose.local.yml up -d
#   Open:   http://localhost:5000
#   Logs:   docker compose -f docker-compose.local.yml logs -f postiz
#   Stop:   docker compose -f docker-compose.local.yml down
services:
  postiz:
    # Apple Silicon (M1/M2/M3) Macs run this amd64 image via emulation — works,
    # just a little slower on first boot. No change needed.
    # Pinned to v2.11.2 — the last single-container release before Postiz
    # required an external Temporal stack (v2.12+). Newer ":latest" images will
    # 502 here because the backend can't reach Temporal. Override via POSTIZ_IMAGE.
    image: ${POSTIZ_IMAGE:-ghcr.io/gitroomhq/postiz-app:v2.11.2}
    container_name: postiz-local
    restart: always
    environment:
      MAIN_URL: "http://localhost:5000"
      FRONTEND_URL: "http://localhost:5000"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5000/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      DATABASE_URL: "postgresql://postiz-user:postiz-local-pw@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://postiz-redis:6379"
      JWT_SECRET: "local-dev-secret-change-if-you-go-public"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
    ports:
      - "5000:5000"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres-local
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-local-pw
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis-local
    restart: always
    volumes:
      - postiz-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
